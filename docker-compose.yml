services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    env_file:
      - .env
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  beat:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file:
      - .env
    volumes:
      - .:/app
    command: celery -A config.celery:app beat --loglevel=info
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: prode
      POSTGRES_USER: prode
      POSTGRES_PASSWORD: prode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  static_volume:
  media_volume:
