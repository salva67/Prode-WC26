services:
  - type: web
    runtime: python
    name: prode-wc26-web
    plan: starter
    region: oregon
    buildCommand: ./build.sh
    preDeployCommand: python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120 --access-logfile - --error-logfile -
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: prode-wc26-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: prode-wc26-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: CSRF_COOKIE_SECURE
        value: "true"
      - key: USE_X_FORWARDED_HOST
        value: "true"
      - key: DEBUG
        value: "false"
      - key: LANGUAGE_CODE
        value: es-ar
      - key: TIME_ZONE
        value: America/Argentina/Buenos_Aires
      - key: DEFAULT_FROM_EMAIL
        value: no-reply@prode.local
      - key: SERVER_EMAIL
        value: no-reply@prode.local

  - type: worker
    runtime: python
    name: prode-wc26-worker
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements/prod.txt
    startCommand: celery -A config worker -l info --concurrency=2
    autoDeployTrigger: commit
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: prode-wc26-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: prode-wc26-redis
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: TIME_ZONE
        value: America/Argentina/Buenos_Aires

  - type: cron
    runtime: python
    name: prode-wc26-scheduler
    plan: starter
    region: oregon
    schedule: "*/1 * * * *"
    buildCommand: pip install -r requirements/prod.txt
    startCommand: python manage.py run_scheduled_tasks
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: prode-wc26-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: prode-wc26-redis
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: TIME_ZONE
        value: America/Argentina/Buenos_Aires

  - type: cron
    runtime: python
    name: prode-wc26-rebuild-nightly
    plan: starter
    region: oregon
    schedule: "0 3 * * *"
    buildCommand: pip install -r requirements/prod.txt
    startCommand: python manage.py rebuild_leaderboard
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: prode-wc26-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: prode-wc26-redis
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: TIME_ZONE
        value: America/Argentina/Buenos_Aires

  - type: keyvalue
    name: prode-wc26-redis
    plan: starter
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: prode-wc26-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"
